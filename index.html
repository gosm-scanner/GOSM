<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSM - AI Universal Grader</title>
    <style>
        :root {
            --rojo-pokedex: #e31a3b;
            --oscuridad-total: #08090c;
            --gris-interfaz: #151821;
            --borde-tech: #ff3355;
            --verde-ps: #2ecc71;
            --azul-exp: #3498db;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            background-color: var(--oscuridad-total);
            color: #ffffff;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, var(--rojo-pokedex) 0%, #b3001b 100%);
            border-bottom: 6px solid #000000;
            padding: 20px;
        }

        .logo-container h1 { margin: 0; font-size: 2.5rem; letter-spacing: 5px; text-shadow: 3px 3px 0px #000; }
        
        .main-container { max-width: 800px; width: 90%; margin: 20px auto; }
        .scanner-card { background: var(--gris-interfaz); border: 4px solid #000000; border-radius: 24px; padding: 25px; }

        .status-badge {
            display: inline-block;
            font-weight: bold;
            color: #000000;
            background: #ffcb05;
            padding: 10px 24px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
        }

        .viewport-wrapper {
            position: relative;
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #000000;
            background: #222; /* Fondo gris para saber si el elemento existe */
        }

        /* Forzamos a que tanto el vídeo como el canvas ocupen el espacio real */
        video, canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        /* Ocultamos el canvas temporalmente si da error, pero el vídeo SE VE SÍ O SÍ */
        #canvasOutput {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .camera-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .target-box {
            width: 75%;
            height: 75%;
            border: 3px dashed var(--borde-tech);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>GOSM</h1>
        </div>
    </header>

    <div class="main-container">
        <div class="scanner-card">
            <div id="status" class="status-badge">Esperando cámara...</div>
            
            <div class="viewport-wrapper">
                <video id="videoInput" autoplay playsinline muted></video>
                <canvas id="canvasOutput"></canvas>
                
                <div class="camera-overlay">
                    <div class="target-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" id="opencv-js"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvasOutput = document.getElementById('canvasOutput');
        const status = document.getElementById('status');
        let src, dst, cap, openCvListo = false;

        // 1. ARRANCAR CÁMARA DE INMEDIATO (Sin esperar a OpenCV)
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, 
            audio: false 
        })
        .then(function(stream) {
            video.srcObject = stream;
            // Doble seguridad para móviles (iOS/Android)
            video.setAttribute("playsinline", true);
            video.play();
            status.innerText = "Cámara conectada. Cargando IA...";
        })
        .catch(function(err) {
            // Si falla la trasera, intentamos cualquier cámara disponible
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
                video.play();
                status.innerText = "Cámara básica activa. Cargando IA...";
            })
            .catch(function(e) {
                status.innerText = "ERROR: Activa los permisos de la cámara";
                status.style.backgroundColor = "#e31a3b";
            });
        });

        // 2. ACTIVAR INTELIGENCIA ARTIFICIAL CUANDO OPENCV CARGUE
        document.getElementById('opencv-js').addEventListener('load', () => {
            openCvListo = true;
            status.innerText = "SISTEMA ONLINE: Apunta a la carta";
            status.style.backgroundColor = "#2ecc71";
            status.style.color = "#fff";
            
            // Sincronizar tamaños al vuelo
            video.addEventListener('loadedmetadata', ajustarLienzos);
            if (video.videoWidth) ajustarLienzos();
        });

        function ajustarLienzos() {
            if (!openCvListo) return;
            canvasOutput.width = video.videoWidth;
            canvasOutput.height = video.videoHeight;
            
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            
            procesarFotograma();
        }

        function procesarFotograma() {
            try {
                cap.read(src);
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                cv.Canny(dst, dst, 35, 125, 3);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                // Limpiamos el canvas para pintar solo las líneas rojas sobre el vídeo transparente
                let context = canvasOutput.getContext('2d');
                context.clearRect(0, 0, canvasOutput.width, canvasOutput.height);

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    if (cv.contourArea(cnt) > 3000) {
                        let color = new cv.Scalar(255, 51, 85, 255);
                        cv.drawContours(src, contours, i, color, 6, cv.LINE_8, hierarchy, 0);
                    }
                    cnt.delete();
                }

                cv.imshow('canvasOutput', src);
                contours.delete(); 
                hierarchy.delete();
            } catch (err) {
                // Evitamos que un fallo cuelgue la cámara
            }
            requestAnimationFrame(procesarFotograma);
        }
    </script>
</body>
</html>
