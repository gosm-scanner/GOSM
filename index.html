<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSM - AI Universal Grader</title>
    <style>
        :root {
            --rojo-pokedex: #e31a3b;
            --rojo-neon: #ff4d6d;
            --oscuridad-total: #08090c;
            --gris-interfaz: #151821;
            --borde-tech: #ff3355;
            --verde-ps: #2ecc71;
            --azul-exp: #3498db;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
            background-color: var(--oscuridad-total);
            background-image: radial-gradient(rgba(227, 26, 59, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
            color: #ffffff;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(180deg, var(--rojo-pokedex) 0%, #b3001b 100%);
            border-bottom: 6px solid #000000;
            padding: 20px;
            position: relative;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        header::before {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: #2575fc;
            border: 5px solid #000000;
            border-radius: 50%;
            box-shadow: 0 0 12px #2575fc, inset 0 0 5px #fff;
            z-index: 10;
        }

        .logo-container h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 5px;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 3px 3px 0px #000;
        }

        .logo-container span {
            font-size: 0.8rem;
            color: #ffccd4;
            display: block;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 5px;
        }

        .ads-banner-top {
            max-width: 728px;
            width: 90%;
            height: 90px;
            background: rgba(21, 24, 33, 0.6);
            border: 2px dashed #ff3355;
            margin: 35px auto 0 auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4d6d;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .main-container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            flex-grow: 1;
        }

        .scanner-card {
            background: var(--gris-interfaz);
            border: 4px solid #000000;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .pokemon-hud-left {
            text-align: left;
            max-width: 440px;
            margin: 0 auto 15px auto;
            font-family: monospace;
            font-weight: bold;
        }
        
        .hud-name { font-size: 1.1rem; color: #fff; }
        .hud-level { float: right; color: #ffcb05; }
        
        .bar-container {
            background: #000;
            border: 2px solid #000;
            height: 8px;
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
        }
        .bar-fill-hp { width: 100%; height: 100%; background: var(--verde-ps); }
        .bar-fill-exp { width: 85%; height: 100%; background: var(--azul-exp); }

        .status-badge {
            display: inline-block;
            font-weight: bold;
            font-size: 0.85rem;
            color: #000000;
            background: #ffcb05;
            padding: 10px 24px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
        }

        /* Contenedor visual del visor */
        .viewport-wrapper {
            position: relative;
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #000000;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Hacemos que el canvas sea 100% visible, ocupando todo el recuadro */
        #canvasOutput {
            width: 100% !important;
            height: auto !important;
            display: block !important; /* Totalmente visible a partir de ahora */
        }

        /* Ocultamos el vídeo bruto porque ya pintamos su imagen dentro del canvas */
        #videoInput {
            display: none;
        }

        .camera-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .target-box {
            width: 75%;
            height: 75%;
            border: 3px dashed var(--borde-tech);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45); /* Oscurece sutilmente los bordes estilo visor */
        }

        .ads-banner-bottom {
            max-width: 300px;
            width: 90%;
            height: 250px;
            background: rgba(21, 24, 33, 0.6);
            border: 2px dashed #ff3355;
            margin: 40px auto 20px auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4d6d;
            font-size: 0.75rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            font-size: 0.8rem;
            color: #a3243c;
            border-top: 3px solid #000;
            background: #0d0103;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>GOSM</h1>
            <span>Universal AI Card Monitor</span>
        </div>
    </header>

    <div class="ads-banner-top">
        <span>ESPACIO ADSENSE DISPONIBLE (728x90)</span>
    </div>

    <div class="main-container">
        <div class="scanner-card">
            
            <div class="pokemon-hud-left">
                <span class="hud-name">SISTEMA_VISION.LOG</span>
                <span class="hud-level">Lv.100</span>
                <div class="bar-container"><div class="bar-fill-hp"></div></div>
                <div class="bar-container"><div class="bar-fill-exp"></div></div>
            </div>

            <div id="status" class="status-badge">Inicializando Escáner Pokédex...</div>
            
            <div class="viewport-wrapper">
                <!-- El vídeo lee los datos de la cámara -->
                <video id="videoInput" playsinline muted></video>
                <!-- El canvas pinta los datos del vídeo más las líneas de la IA -->
                <canvas id="canvasOutput"></canvas>
                
                <div class="camera-overlay">
                    <div class="target-box"></div>
                </div>
            </div>
        </div>

        <div class="ads-banner-bottom">
            <span>ESPACIO ADSENSE DISPONIBLE (300x250)</span>
        </div>
    </div>

    <footer>
        &copy; 2026 GOSM Lab &bull; Visión Artificial Estable.
    </footer>

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" id="opencv-js"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvasOutput = document.getElementById('canvasOutput');
        const status = document.getElementById('status');
        let src, dst, cap, streamActivo = null;

        document.getElementById('opencv-js').addEventListener('load', () => {
            status.innerText = "IA ONLINE: Encendiendo Ópticas...";
            status.style.backgroundColor = "#2ecc71";
            status.style.color = "#fff";
            
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }, 
                audio: false 
            })
            .then(function(stream) {
                streamActivo = stream;
                video.srcObject = stream;
                video.play();
                
                video.addEventListener('loadedmetadata', () => {
                    canvasOutput.width = video.videoWidth;
                    canvasOutput.height = video.videoHeight;
                    status.innerText = "SISTEMA ACTIVO: Apunta a tu carta";
                    setTimeout(iniciarProcesamiento, 500);
                });
            })
            .catch(function(err) {
                status.innerText = "ERROR: Acceso a cámara denegado";
                status.style.backgroundColor = "#e31a3b";
            });
        });

        function iniciarProcesamiento() {
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            
            procesarFotograma();
        }

        function procesarFotograma() {
            if (!streamActivo) return;
            
            try {
                // 1. Leemos lo que ve la cámara y lo volcamos a la matriz original
                cap.read(src);
                
                // 2. Duplicamos la imagen en blanco y negro de fondo para que la IA busque los bordes
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                cv.Canny(dst, dst, 35, 125, 3);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                // 3. Dibujamos los contornos detectados directamente encima de la imagen a color real
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    
                    if (area > 4000) {
                        let color = new cv.Scalar(255, 51, 85, 255); // Rojo Neón de escaneo
                        cv.drawContours(src, contours, i, color, 5, cv.LINE_8, hierarchy, 0);
                    }
                    cnt.delete();
                }

                // 4. Mostramos el resultado final (Vídeo real + líneas de la IA unidas) en el recuadro
                cv.imshow('canvasOutput', src);
                
                contours.delete(); 
                hierarchy.delete();
                
                requestAnimationFrame(procesarFotograma);
            } catch (err) {
                requestAnimationFrame(procesarFotograma);
            }
        }
    </script>
</body>
</html>
