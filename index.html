<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSM - AI Universal Grader</title>
    <style>
        :root {
            --rojo-pokedex: #e31a3b;
            --oscuridad-total: #08090c;
            --gris-interfaz: #151821;
            --borde-tech: #ff3355;
            --verde-ps: #2ecc71;
            --azul-exp: #3498db;
            --amarillo-hud: #ffcb05;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            background-color: var(--oscuridad-total);
            color: #ffffff;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, var(--rojo-pokedex) 0%, #b3001b 100%);
            border-bottom: 6px solid #000000;
            padding: 20px;
        }

        .logo-container h1 { margin: 0; font-size: 2.5rem; letter-spacing: 5px; text-shadow: 3px 3px 0px #000; }
        
        .main-container { max-width: 800px; width: 90%; margin: 20px auto; }
        .scanner-card { background: var(--gris-interfaz); border: 4px solid #000000; border-radius: 24px; padding: 25px; }

        .status-badge {
            display: inline-block;
            font-weight: bold;
            color: #000000;
            background: var(--amarillo-hud);
            padding: 10px 24px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .viewport-wrapper {
            position: relative;
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #000000;
            background: #222;
        }

        video, canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        #canvasOutput {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .camera-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .target-box {
            width: 75%;
            height: 75%;
            border: 3px dashed var(--borde-tech);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* ANIMACIÓN: Línea láser neón */
        .laser-line {
            display: none;
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff3355, #ff99ab, #ff3355, transparent);
            box-shadow: 0 0 15px #ff3355, 0 0 25px #ff99ab;
            z-index: 6;
            animation: bajarSubir 2s infinite ease-in-out;
        }

        @keyframes bajarSubir {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* TICK VERDE */
        .success-tick {
            display: none;
            position: absolute;
            font-size: 5rem;
            color: var(--verde-ps);
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.6), 3px 3px 0 #000;
            z-index: 7;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* RESULTADOS */
        .results-box {
            display: none;
            margin-top: 25px;
            background: #0d0f14;
            border: 3px solid #000;
            border-radius: 16px;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-box h3 {
            margin-top: 0;
            color: var(--amarillo-hud);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid #1f2430;
            font-family: monospace;
            font-size: 1rem;
        }

        .results-table td:first-child { text-align: left; color: #a0a5b5; }
        .results-table td:last-child { text-align: right; font-weight: bold; color: var(--verde-ps); }
        
        .final-grade {
            font-size: 1.5rem;
            color: #fff;
            margin-top: 15px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff3355, #b3001b);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>GOSM</h1>
        </div>
    </header>

    <div class="main-container">
        <div class="scanner-card">
            <div id="status" class="status-badge">Esperando cámara...</div>
            
            <div class="viewport-wrapper">
                <video id="videoInput" autoplay playsinline muted></video>
                <canvas id="canvasOutput"></canvas>
                
                <div class="camera-overlay">
                    <div id="laser" class="laser-line"></div>
                    <div id="tick" class="success-tick">✔</div>
                    <div class="target-box"></div>
                </div>
            </div>

            <div id="resultsPanel" class="results-box">
                <h3>Análisis de Autenticidad e Integridad</h3>
                <table class="results-table">
                    <tr><td>CENTRADO (CENTERING)</td><td>9.5 / 10</td></tr>
                    <tr><td>BORDES (EDGES)</td><td>10 / 10</td></tr>
                    <tr><td>ESQUINAS (CORNERS)</td><td>9.0 / 10</td></tr>
                    <tr><td>SUPERFICIE (SURFACE)</td><td>9.5 / 10</td></tr>
                </table>
                <div class="final-grade">NOTA FINAL: MINT 9.5</div>
            </div>

        </div>
    </div>

    <script async src="https://code.opencv.org/4.5.5/opencv.js" type="text/javascript" id="opencv-js"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvasOutput = document.getElementById('canvasOutput');
        const status = document.getElementById('status');
        const laser = document.getElementById('laser');
        const tick = document.getElementById('tick');
        const resultsPanel = document.getElementById('resultsPanel');

        let src, dst, cap, openCvListo = false;
        let escaneando = false;
        let escaneoTerminado = false;
        let progreso = 0;
        let temporizadorEscaneo;

        // Arrancar cámara nativa de inmediato
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            status.innerText = "Cámara OK. Conectando con Servidor IA...";
        })
        .catch(function(err) {
            navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(function(stream) {
                video.srcObject = stream;
                video.play();
                status.innerText = "Cámara Básica OK. Conectando con Servidor IA...";
            });
        });

        // SISTEMA ANTIBLOQUEO: Si en 5 segundos el servidor no responde, activamos el modo simulación
        setTimeout(() => {
            if (!openCvListo) {
                console.log("Activando bypass por lentitud de servidor");
                forzarSistemaOnline();
            }
        }, 5000);

        document.getElementById('opencv-js').addEventListener('load', () => {
            if (escaneoTerminado || escaneando) return; // Evita pisar el bypass si responde tarde
            openCvListo = true;
            status.innerText = "SISTEMA ONLINE: Apunta a la carta";
            status.style.backgroundColor = "#2ecc71";
            status.style.color = "#fff";
            
            video.addEventListener('loadedmetadata', ajustarLienzos);
            if (video.videoWidth) ajustarLienzos();
        });

        function forzarSistemaOnline() {
            openCvListo = true;
            status.innerText = "SISTEMA ONLINE (Modo Rápido): Toca la pantalla para escanear";
            status.style.backgroundColor = "#2ecc71";
            status.style.color = "#fff";
            
            // Si la IA falla, dejamos que empiece el escaneo al hacer clic en el recuadro para ver el efecto
            document.querySelector('.viewport-wrapper').addEventListener('click', () => {
                if (!escaneando && !escaneoTerminado) {
                    dispararEscaneoSimulado();
                }
            });
            
            // Simular también de forma automática a los 2 segundos por si acaso
            setTimeout(() => {
                if (!escaneando && !escaneoTerminado) dispararEscaneoSimulado();
            }, 2000);
        }

        function ajustarLienzos() {
            if (!openCvListo || !window.cv) return;
            canvasOutput.width = video.videoWidth;
            canvasOutput.height = video.videoHeight;
            
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            
            procesarFotograma();
        }

        function procesarFotograma() {
            if (!openCvListo || escaneoTerminado || !window.cv) {
                requestAnimationFrame(procesarFotograma);
                return;
            }
            try {
                cap.read(src);
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                cv.Canny(dst, dst, 35, 125, 3);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let cartaDetectada = false;

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    if (cv.contourArea(cnt) > 2000) {
                        let color = new cv.Scalar(255, 51, 85, 255);
                        cv.drawContours(src, contours, i, color, 6, cv.LINE_8, hierarchy, 0);
                        cartaDetectada = true;
                    }
                    cnt.delete();
                }

                if (cartaDetectada && !escaneando) {
                    dispararEscaneoSimulado();
                }

                cv.imshow('canvasOutput', src);
                contours.delete(); 
                hierarchy.delete();
            } catch (err) { }
            requestAnimationFrame(procesarFotograma);
        }

        function dispararEscaneoSimulado() {
            if (escaneando || escaneoTerminado) return;
            escaneando = true;
            laser.style.display = "block";
            status.style.backgroundColor = "#3498db";
            
            temporizadorEscaneo = setInterval(() => {
                progreso += 4;
                if (progreso <= 100) {
                    status.innerText = `ESCANEANDO CARTA... ${progreso}%`;
                } else {
                    clearInterval(temporizadorEscaneo);
                    escaneando = false;
                    escaneoTerminado = true;
                    
                    laser.style.display = "none";
                    tick.style.display = "block";
                    status.innerText = "ESCANEO COMPLETADO ✔";
                    status.style.backgroundColor = "#2ecc71";
                    resultsPanel.style.display = "block";
                }
            }, 250);
        }
    </script>
</body>
</html>
