<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSM - Card Analyzer</title>
    <style>
        :root {
            --rojo-pokedex: #e31a3b;
            --oscuridad-total: #08090c;
            --gris-interfaz: #151821;
            --borde-tech: #ff3355;
            --verde-ps: #2ecc71;
            --azul-exp: #3498db;
            --amarillo-hud: #ffcb05;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            background-color: var(--oscuridad-total);
            color: #ffffff;
            padding: 0; margin: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, var(--rojo-pokedex) 0%, #b3001b 100%);
            border-bottom: 6px solid #000000;
            padding: 15px;
        }

        .logo-container h1 { margin: 0; font-size: 2.2rem; letter-spacing: 5px; text-shadow: 3px 3px 0px #000; }
        
        .main-container { max-width: 800px; width: 95%; margin: 15px auto; }
        .scanner-card { background: var(--gris-interfaz); border: 4px solid #000000; border-radius: 24px; padding: 20px; }

        .status-badge {
            display: inline-block;
            font-weight: bold;
            color: #000000;
            background: var(--amarillo-hud);
            padding: 10px 24px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        .viewport-wrapper {
            position: relative;
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #000000;
            background: #222;
        }

        video, canvas { width: 100% !important; height: auto !important; display: block; }
        #canvasOutput { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .camera-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .target-box {
            width: 75%; height: 75%;
            border: 3px dashed var(--borde-tech);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
            position: relative;
            transition: border-color 0.3s ease;
        }

        .laser-line {
            display: none;
            position: absolute;
            left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #ff3355, #ff99ab, #ff3355, transparent);
            box-shadow: 0 0 15px #ff3355;
            z-index: 6;
            animation: bajarSubir 1.5s infinite ease-in-out;
        }

        @keyframes bajarSubir {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .success-tick {
            display: none;
            position: absolute;
            font-size: 5rem;
            color: var(--verde-ps);
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.6), 3px 3px 0 #000;
            z-index: 7;
        }

        .results-box {
            display: none;
            margin-top: 20px;
            background: #0d0f14;
            border: 3px solid #000;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
        }

        .card-identity-header {
            background: #1f2430;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--borde-tech);
            margin-bottom: 20px;
        }

        .card-identity-header h2 { margin: 0; font-size: 1.4rem; color: #fff; }
        .card-identity-header p { margin: 6px 0 0 0; font-size: 0.95rem; color: var(--amarillo-hud); font-family: monospace; }

        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 12px; border-bottom: 1px solid #1f2430; font-family: monospace; font-size: 0.95rem; }
        .results-table td:first-child { color: #cbd5e1; }
        .results-table td:last-child { text-align: right; font-weight: bold; }
        
        .final-grade {
            font-size: 1.3rem; color: #fff; margin-top: 20px; font-weight: 900; text-align: center;
            background: linear-gradient(90deg, #ff3355, #b3001b); padding: 12px; border-radius: 8px; border: 2px solid #000;
            letter-spacing: 1px;
        }

        .btn-reset {
            display: none;
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(180deg, var(--azul-exp) 0%, #217dbb 100%);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            padding: 15px;
            border-radius: 12px;
            border: 3px solid #000;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>GOSM</h1>
        </div>
    </header>

    <div class="main-container">
        <div class="scanner-card">
            <div id="status" class="status-badge">Iniciando Ópticas...</div>
            
            <div class="viewport-wrapper">
                <video id="videoInput" autoplay playsinline muted></video>
                <canvas id="canvasOutput"></canvas>
                
                <div class="camera-overlay">
                    <div id="laser" class="laser-line"></div>
                    <div id="tick" class="success-tick">✔</div>
                    <div id="targetBox" class="target-box"></div>
                </div>
            </div>

            <div id="resultsPanel" class="results-box">
                <div class="card-identity-header">
                    <h2 id="cardName">Detectando...</h2>
                    <p id="cardSet">Colección: --</p>
                    <p id="cardAuthor">Diseñador: --</p>
                </div>

                <table class="results-table">
                    <tr><td>CENTRADO (CENTERING)</td><td id="resCentrado">--</td></tr>
                    <tr><td>BORDES (EDGES / WHITENING)</td><td id="resBordes">--</td></tr>
                    <tr><td>SUPERFICIE (MICRO-SCRATCHES)</td><td id="resSuperficie">--</td></tr>
                    <tr><td>ESQUINAS (CORNERS)</td><td id="resEsquinas">--</td></tr>
                </table>
                <div class="final-grade" id="resNota">EVALUACIÓN GOSM: --</div>
                
                <button id="btnReset" class="btn-reset" onclick="reiniciarEscaner()">🔄 Evaluar Otra Carta</button>
            </div>
        </div>
    </div>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.5/opencv.js" type="text/javascript" id="opencv-js"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvasOutput = document.getElementById('canvasOutput');
        const status = document.getElementById('status');
        const laser = document.getElementById('laser');
        const tick = document.getElementById('tick');
        const targetBox = document.getElementById('targetBox');
        const resultsPanel = document.getElementById('resultsPanel');
        const btnReset = document.getElementById('btnReset');

        let src, dst, cap, openCvListo = false;
        let escaneando = false, escaneoTerminado = false, progreso = 0, temporizadorEscaneo;
        let irregularidadTotal = 0, lecturasContadas = 0;

        const baseCartasDemo = [
            { name: "Charizard G-Max VMAX", set: "Espada y Escudo: Destinos Brillantes (050/073)", author: "Ryuta Fuse" },
            { name: "Pikachu Illustrator", set: "Promo CoroCoro Comics (1998)", author: "Atsuko Nishida" },
            { name: "Mewtwo Star Gold", set: "EX Holon Phantoms (103/110)", author: "Masakazu Fukuda" }
        ];

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            status.innerText = "GOSM: Enfoca la carta";
        });

        document.getElementById('opencv-js').addEventListener('load', () => {
            openCvListo = true;
            video.addEventListener('loadedmetadata', iniciarMatrices);
            if (video.videoWidth) iniciarMatrices();
        });

        function iniciarMatrices() {
            canvasOutput.width = video.videoWidth;
            canvasOutput.height = video.videoHeight;
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            procesarFotograma();
        }

        function procesarFotograma() {
            if (!openCvListo || escaneoTerminado) return;
            try {
                cap.read(src);
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                
                // Suavizamos el Canny para que no se quede congelado nunca más
                cv.Canny(dst, dst, 50, 150, 3);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let cartaDetectada = false;
                let perimetroIrregular = 0;

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    
                    if (area > 3000) { // Umbral equilibrado para que detecte al instante
                        let color = new cv.Scalar(255, 51, 85, 255);
                        cv.drawContours(src, contours, i, color, 4, cv.LINE_8, hierarchy, 0);
                        cartaDetectada = true;
                        let perimetro = cv.arcLength(cnt, true);
                        perimetroIrregular = Math.abs((perimetro * perimetro) / (area * 16) - 1);
                    }
                    cnt.delete();
                }

                // NUEVA ALERTA FLUIDA: Si se mueve demasiado o la imagen está borrosa, avisa sin bloquearse
                if (cartaDetectada && perimetroIrregular > 0.15) {
                    targetBox.style.borderColor = "var(--amarillo-hud)";
                    status.innerText = "⚠️ MEJORA EL ENFOQUE / SE MUEVE";
                    status.style.backgroundColor = "var(--amarillo-hud)";
                    status.style.color = "#000";
                    
                    if (escaneando) {
                        clearInterval(temporizadorEscaneo);
                        escaneando = false;
                        laser.style.display = "none";
                    }
                } 
                // Si la imagen es clara y estable, arranca el escáner
                else if (cartaDetectada && perimetroIrregular <= 0.15) {
                    targetBox.style.borderColor = "var(--verde-ps)";
                    
                    if (!escaneando) {
                        escaneando = true;
                        laser.style.display = "block";
                        status.style.backgroundColor = "var(--azul-exp)";
                        status.style.color = "#fff";
                        progreso = 0; irregularidadTotal = 0; lecturasContadas = 0;

                        temporizadorEscaneo = setInterval(() => {
                            progreso += 5;
                            irregularidadTotal += perimetroIrregular;
                            lecturasContadas++;

                            if (progreso <= 100) {
                                status.innerText = `ANALIZANDO CARTA... ${progreso}%`;
                            } else {
                                clearInterval(temporizadorEscaneo);
                                escaneando = false; escaneoTerminado = true;
                                
                                // EXIGENCIA RADICAL: Si la carta es mala o el entorno tiene ruido, las notas se desploman
                                let promedioRuido = (irregularidadTotal / lecturasContadas) * 100;
                                
                                let notaBordes = Math.max(1, Math.floor(10 - (promedioRuido * 22.0)));
                                let notaScratches = Math.max(1, Math.floor(10 - (promedioRuido * 18.0)));
                                let notaCentrado = Math.max(1, Math.floor(10 - (promedioRuido * 12.0)));
                                let notaEsquinas = Math.max(1, Math.floor(10 - (promedioRuido * 20.0)));
                                
                                // Si detecta imperfecciones (carta de mierda), forzamos notas bajas de verdad (del 1 al 5)
                                if (promedioRuido > 0.01) {
                                    notaBordes = Math.min(notaBordes, Math.floor(Math.random() * (5 - 2) + 2));
                                    notaScratches = Math.min(notaScratches, Math.floor(Math.random() * (6 - 3) + 3));
                                    notaEsquinas = Math.min(notaEsquinas, Math.floor(Math.random() * (4 - 1) + 1));
                                }

                                // El veredicto final se rige por el peor daño detectado
                                let notaFinalCalculada = Math.min(notaCentrado, notaBordes, notaScratches, notaEsquinas);
                                
                                let rangoTexto = "";
                                if (notaFinalCalculada === 10) rangoTexto = "10 (PERFECTA)";
                                else if (notaFinalCalculada === 9) rangoTexto = "9 (EXCELENTE)";
                                else if (notaFinalCalculada >= 7) rangoTexto = `${notaFinalCalculada} (ESTÁNDAR)`;
                                else if (notaFinalCalculada >= 4) rangoTexto = `${notaFinalCalculada} (DAÑADA / USADA)`;
                                else rangoTexto = `${notaFinalCalculada} (MUY MALA CALIDAD)`;

                                pintarNota('resCentrado', notaCentrado);
                                pintarNota('resBordes', notaBordes);
                                pintarNota('resSuperficie', notaScratches);
                                pintarNota('resEsquinas', notaEsquinas);
                                
                                document.getElementById('resNota').innerText = `CALIFICACIÓN: GOSM ${rangoTexto}`;

                                let datosCarta = baseCartasDemo[Math.floor(Math.random() * baseCartasDemo.length)];
                                document.getElementById('cardName').innerText = datosCarta.name;
                                document.getElementById('cardSet').innerText = `Colección: ${datosCarta.set}`;
                                document.getElementById('cardAuthor').innerText = `Diseñador: ${datosCarta.author}`;

                                laser.style.display = "none";
                                tick.style.display = "block";
                                targetBox.style.borderColor = "var(--verde-ps)";
                                status.innerText = "ANÁLISIS COMPLETADO ✔";
                                status.style.backgroundColor = "var(--verde-ps)";
                                resultsPanel.style.display = "block";
                                btnReset.style.display = "block";
                            }
                        }, 250);
                    }
                } 
                else if (!cartaDetectada && escaneando) {
                    clearInterval(temporizadorEscaneo);
                    escaneando = false; laser.style.display = "none";
                    targetBox.style.borderColor = "var(--borde-tech)";
                    status.innerText = "GOSM: Enfoca la carta";
                    status.style.backgroundColor = "var(--amarillo-hud)";
                }

                cv.imshow('canvasOutput', src);
                contours.delete(); hierarchy.delete();
            } catch (err) { }
            requestAnimationFrame(procesarFotograma);
        }

        function pintarNota(id, nota) {
            const el = document.getElementById(id);
            el.innerText = `${nota} / 10`;
            if (nota >= 9) el.style.color = "var(--verde-ps)";
            else if (nota >= 6) el.style.color = "var(--amarillo-hud)";
            else el.style.color = "var(--borde-tech)";
        }

        function reiniciarEscaner() {
            escaneoTerminado = false; escaneando = false; progreso = 0;
            tick.style.display = "none"; resultsPanel.style.display = "none"; btnReset.style.display = "none";
            targetBox.style.borderColor = "var(--borde-tech)";
            status.innerText = "GOSM: Enfoca la carta";
            status.style.backgroundColor = "var(--amarillo-hud)";
            status.style.color = "#000";
            procesarFotograma();
        }
    </script>
</body>
</html>
