<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSM - Universal Card Evaluator</title>
    <style>
        :root {
            --rojo-gosm: #e31a3b;
            --oscuridad-total: #0c0e12;
            --gris-panel: #1a1d24;
            --gris-celda: #252932;
            --borde-tech: #ff3355;
            --verde-nota: #2ecc71;
            --amarillo-nota: #f1c40f;
            --rojo-nota: #e74c3c;
            --azul-btn: #0066cc;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            text-align: center;
            background-color: var(--oscuridad-total);
            color: #ffffff;
            padding: 0; margin: 0;
            min-height: 100vh;
        }

        header {
            background: #11141a;
            border-bottom: 3px solid var(--rojo-gosm);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 4px;
            color: var(--rojo-gosm);
            font-weight: 800;
        }
        
        .main-container {
            max-width: 480px;
            width: 95%;
            margin: 20px auto;
        }

        .status-badge {
            display: block;
            font-weight: bold;
            color: #000000;
            background: var(--amarillo-nota);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid #1a1d24;
            background: #111;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        video, canvas { width: 100% !important; height: auto !important; display: block; }
        #canvasOutput { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        .camera-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .target-box {
            width: 75%; height: 78%;
            border: 3px solid var(--amarillo-nota);
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
            transition: border-color 0.3s ease;
        }

        .laser-line {
            display: none;
            position: absolute;
            left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #ff3355, #ff99ab, #ff3355, transparent);
            box-shadow: 0 0 15px #ff3355;
            z-index: 6;
            animation: bajarSubir 1.6s infinite ease-in-out;
        }

        @keyframes bajarSubir {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        .success-tick {
            display: none;
            position: absolute;
            font-size: 5rem;
            color: var(--verde-nota);
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.6);
            z-index: 7;
        }

        /* DISEÑO DE LOS RESULTADOS (IDÉNTICO A LA IMAGEN) */
        .results-box {
            display: none;
            margin-top: 20px;
            background: var(--gris-panel);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .results-box h2 {
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            color: var(--rojo-gosm);
            font-weight: 800;
        }

        .card-meta-info {
            font-size: 0.95rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 15px;
        }

        .results-table th {
            text-align: left;
            color: #8a94a6;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 0 10px;
        }

        .results-table td {
            padding: 12px 15px;
            background: var(--gris-celda);
            font-weight: bold;
            font-size: 0.95rem;
        }

        .results-table tr td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .results-table tr td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            text-align: center;
            width: 30%;
            color: #000000;
            font-size: 1.1rem;
        }

        .final-badge-footer {
            background: #11141a;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--rojo-gosm);
            border: 1px solid rgba(227, 26, 59, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* EL BOTÓN AZUL DE REINICIO DE LA IMAGEN */
        .btn-reset {
            display: none;
            width: 100%;
            margin-top: 15px;
            background: linear-gradient(180deg, #0077ff 0%, #0055cc 100%);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            padding: 16px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(0, 85, 204, 0.4);
            transition: transform 0.1s;
        }

        .btn-reset:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>GOSM</h1>
        </div>
    </header>

    <div class="main-container">
        <div id="status" class="status-badge">GOSM: INICIANDO ÓPTICAS...</div>
        
        <div class="viewport-wrapper">
            <video id="videoInput" autoplay playsinline muted></video>
            <canvas id="canvasOutput"></canvas>
            
            <div class="camera-overlay">
                <div id="laser" class="laser-line"></div>
                <div id="tick" class="success-tick">✔</div>
                <div id="targetBox" class="target-box"></div>
            </div>
        </div>

        <div id="resultsPanel" class="results-box">
            <h2>GOSM</h2>
            <div class="card-meta-info" id="cardIdentity">
                IDENTIDAD: Detectando...
            </div>

            <table class="results-table">
                <thead>
                    <tr>
                        <th>Categoría</th>
                        <th style="text-align: center;">GOSM Nota</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>CENTRADO<br><span style="font-size:0.75rem; color:#718096;">(CENTERING)</span></td>
                        <td id="resCentrado">--</td>
                    </tr>
                    <tr>
                        <td>BORDES<br><span style="font-size:0.75rem; color:#718096;">(EDGES/WHITENING)</span></td>
                        <td id="resBordes">--</td>
                    </tr>
                    <tr>
                        <td>SUPERFICIE<br><span style="font-size:0.75rem; color:#718096;">(SCRATCHES)</span></td>
                        <td id="resSuperficie">--</td>
                    </tr>
                    <tr>
                        <td>ESQUINAS<br><span style="font-size:0.75rem; color:#718096;">(CORNERS)</span></td>
                        <td id="resEsquinas">--</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="final-badge-footer" id="resNota">CERTIFICACIÓN: --</div>
        </div>

        <button id="btnReset" class="btn-reset" onclick="reiniciarEscaner()">🔄 Escanear Otra Carta<br><span style="font-size:0.75rem; font-weight:400; opacity:0.9;">(REINICIAR GOSM)</span></button>
    </div>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.5/opencv.js" type="text/javascript" id="opencv-js"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvasOutput = document.getElementById('canvasOutput');
        const status = document.getElementById('status');
        const laser = document.getElementById('laser');
        const tick = document.getElementById('tick');
        const targetBox = document.getElementById('targetBox');
        const resultsPanel = document.getElementById('resultsPanel');
        const btnReset = document.getElementById('btnReset');

        let src, dst, cap, openCvListo = false;
        let escaneando = false, escaneoTerminado = false, progreso = 0, temporizadorEscaneo;
        let lecturasContadas = 0;

        // Base de datos inteligente de emulación
        const poolCartas = [
            { name: "Charizard (Daño Masivo, Bordes Rotos)", set: "Base Set Edition", type: "bad" },
            { name: "Pikachu Illustrator (Desgaste Avanzado)", set: "Promo CoroCoro", type: "bad" },
            { name: "Mewtwo Star (Arañazos detectados)", set: "EX Holon Phantoms", type: "bad" }
        ];

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            status.innerText = "GOSM: ENFOCA LA CARTA";
        }).catch(err => {
            status.innerText = "ERROR: ACTIVA EL PERMISO DE CÁMARA";
        });

        document.getElementById('opencv-js').addEventListener('load', () => {
            openCvListo = true;
            video.addEventListener('loadedmetadata', iniciarMatrices);
            if (video.videoWidth) iniciarMatrices();
        });

        function iniciarMatrices() {
            canvasOutput.width = video.videoWidth;
            canvasOutput.height = video.videoHeight;
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            procesarFotograma();
        }

        function procesarFotograma() {
            if (!openCvListo || escaneoTerminado) return;
            try {
                cap.read(src);
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                cv.Canny(dst, dst, 40, 120, 3);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let cartaDetectada = false;

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > 2500) { // Umbral adaptativo para evitar cuelgues
                        let color = new cv.Scalar(227, 26, 59, 255);
                        cv.drawContours(src, contours, i, color, 3, cv.LINE_8, hierarchy, 0);
                        cartaDetectada = true;
                    }
                    cnt.delete();
                }

                // Si la carta entra en la zona, el recuadro pasa a amarillo/rojo y escanea de forma estable
                if (cartaDetectada && !escaneando) {
                    escaneando = true;
                    laser.style.display = "block";
                    targetBox.style.borderColor = "var(--rojo-gosm)";
                    progreso = 0;

                    temporizadorEscaneo = setInterval(() => {
                        progreso += 10;
                        if (progreso <= 100) {
                            status.innerText = `GOSM: EVALUANDO CARTA (CRITERIOS ESTRICTOS)... ${progreso}%`;
                            status.style.backgroundColor = "var(--rojo-gosm)";
                            status.style.color = "#fff";
                        } else {
                            clearInterval(temporizadorEscaneo);
                            escaneando = false; escaneoTerminado = true;
                            
                            // FORZAR NOTAS SUSPENDIDAS (Mismo comportamiento estricto que en tu imagen)
                            let notaCentrado = "6.5";
                            let notaBordes = "2.0";
                            let notaSuperficie = "3.0";
                            let notaEsquinas = "1.5";

                            // Volcar las notas y aplicar los colores de fondo de las celdas exactos
                            configurarCelda('resCentrado', notaCentrado, 'var(--amarillo-nota)');
                            configurarCelda('resBordes', notaBordes, 'var(--rojo-nota)');
                            configurarCelda('resSuperficie', notaSuperficie, 'var(--rojo-nota)');
                            configurarCelda('resEsquinas', notaEsquinas, 'var(--rojo-nota)');

                            // Asignar los textos de la carta de mierda detectada
                            let info = poolCartas[Math.floor(Math.random() * poolCartas.length)];
                            document.getElementById('cardIdentity').innerHTML = `IDENTIDAD: ${info.name}<br><span style="color:#8a94a6; font-size:0.85rem;">Colección: ${info.set}</span>`;
                            
                            document.getElementById('resNota').innerText = "CERTIFICACIÓN: GOSM 2 (POOR - DAÑADA)";

                            // Cambios de interfaz gráfica finales
                            laser.style.display = "none";
                            tick.style.display = "block";
                            status.innerText = "EVALUACIÓN SUSPENDIDA Y REINICIO";
                            status.style.backgroundColor = "var(--rojo-nota)";
                            resultsPanel.style.display = "block";
                            btnReset.style.display = "block"; // Mostrar el botón azul
                        }
                    }, 200);
                }

                cv.imshow('canvasOutput', src);
                contours.delete(); hierarchy.delete();
            } catch (err) { }
            requestAnimationFrame(procesarFotograma);
        }

        function configurarCelda(id, valor, colorFondo) {
            const el = document.getElementById(id);
            el.innerHTML = `${valor}<br><span style="font-size:0.7rem; font-weight:800; text-transform:uppercase;">${colorFondo.includes('amarillo') ? 'AMARILLO' : 'ROJO'}</span>`;
            el.style.backgroundColor = colorFondo;
            el.style.color = "#000000";
        }

        function reiniciarEscaner() {
            escaneoTerminado = false; escaneando = false; progreso = 0;
            tick.style.display = "none"; resultsPanel.style.display = "none"; btnReset.style.display = "none";
            targetBox.style.borderColor = "var(--amarillo-nota)";
            status.innerText = "GOSM: ENFOCA LA CARTA";
            status.style.backgroundColor = "var(--amarillo-nota)";
            status.style.color = "#000";
            procesarFotograma();
        }
    </script>
</body>
</html>
